<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotizador</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <section class="header w-full">
      <nav
        class="menu w-full flex justify-between items-center p-8 content-center"
      >
        <div class="logo w-auto">
          <img src="img/logo.png" alt="Logo" class="" />
        </div>
      </nav>
    </section>
    <section class="hero w-full">
      <div
        class="container max-w-full flex flex-col justify-center items-center"
      >
        <div
          class="formulario relative flex w-1/2 flex-col rounded-xl bg-white bg-clip-border text-gray-700 shadow-md"
        >
          <div
            class="relative mx-4 -mt-6 mb-4 grid h-28 place-items-center overflow-hidden rounded-xl bg-linear-to-tr from-violet-600 to-violet-400 bg-clip-border text-white shadow-lg shadow-violet-500/40"
          >
            <h3
              class="block font-sans text-3xl font-semibold leading-snug tracking-normal text-white antialiased"
            >
              Cotiza tu producto
            </h3>
          </div>
          <div class="flex flex-col gap-4 p-6"></div>

          <form
            action=""
            class="w-full grid grid-cols-2 justify-center pb-6 gap-y-2"
          >
            <div
              class="inputvalue h-12 mt-4 rounded-xl text-2xl m-4 bg-[#d6bde5] relative inline-flex text-black items-center shadow-violet-300 shadow-lg"
            >
              <input
                id="price"
                name="valor"
                type="number"
                step="0.01"
                placeholder="Precio Comercial"
                class="w-full h-10 rounded-xl text-start pl-4"
              />
              <div
                class="inputvaluedecor flex justify-center h-12 items-center bg-violet-600 p-4 rounded-md text-white font-bold"
              >
                USD
              </div>
            </div>
            <div
              class="inputweight h-12 mt-4 rounded-xl text-2xl m-4 bg-[#d6bde5] relative inline-flex text-black items-center shadow-violet-300 shadow-lg"
            >
              <input
                id="weight"
                name="valor"
                type="number"
                placeholder="Peso del producto"
                class="w-full h-10 rounded-xl text-start pl-4"
              />
              <div
                class="inputweightdeco flex justify-center h-12 items-center bg-violet-600 p-4 rounded-md text-white font-bold"
              >
                Lbs
              </div>
            </div>
            <div
              class="inputvalue h-12 mt-4 rounded-xl text-2xl m-4 bg-[#d6bde5] relative inline-flex text-black items-center shadow-violet-300 shadow-lg"
            >
              <input
                id="discount"
                name="discount"
                type="number"
                placeholder="% Descuento"
                class="w-full h-10 rounded-xl text-start pl-4"
              />
              <div
                class="inputvaluedecor flex justify-center h-12 items-center bg-violet-600 p-4 rounded-md text-white font-bold"
              >
                %DCTO
              </div>
            </div>
            <div
              class="inputweight h-12 mt-4 rounded-xl text-2xl m-4 bg-[#d6bde5] relative inline-flex text-black items-center shadow-violet-300 shadow-lg"
            >
              <input
                id="unidades"
                name="unidades"
                type="number"
                placeholder="Cantidad"
                aria-invalid="false"
                class="w-full h-10 rounded-xl text-start pl-4"
              />
            </div>

            <button
              type="submit"
              class="w-full left-1/2 h-12 rounded-md text-xl m-4 bg-[#d6bde5] relative text-black uppercase font-bold items-center shadow-violet-300 shadow-lg cursor-pointer hover:bg-violet-600 hover:text-white transition-all duration-300 ease-in-out"
            >
              Calcular
            </button>
          </form>
        </div>
        <div class="result"></div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
